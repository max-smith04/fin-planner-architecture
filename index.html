<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fin Planner — Architecture Map</title>
<style>
  :root{
    --bg:#0F0F0F; --panel:#161616; --panel-2:#1c1c1c; --border:#2a2a2a;
    --text:#e8e8e8; --muted:#8a8a8a;
    --client:#4ea1ff; --route:#7bd389; --service:#c792ea; --db:#ffb86b;
    --external:#ff6b9d; --critical:#ff3860; --accent:#f5b942; --accent-2:#ff7a45;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden}
  #app{display:flex;height:100vh;width:100vw}
  #stage{position:relative;flex:1;overflow:hidden;cursor:grab}
  #stage.panning{cursor:grabbing}
  svg{display:block;width:100%;height:100%}

  #topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;
    align-items:center;gap:10px;padding:10px 14px;flex-wrap:wrap;
    background:linear-gradient(180deg,rgba(15,15,15,.96),rgba(15,15,15,.6) 70%,transparent);
    pointer-events:none}
  #topbar > *{pointer-events:auto}
  .title{font-weight:700;font-size:14px;letter-spacing:.2px;margin-right:6px}
  .title small{font-weight:400;color:var(--muted);font-size:11px}
  .chip{font-size:11.5px;padding:5px 11px;border:1px solid var(--border);border-radius:999px;
    background:var(--panel);color:var(--muted);cursor:pointer;user-select:none;
    transition:all .12s ease;white-space:nowrap}
  .chip:hover{color:var(--text);border-color:#3a3a3a}
  .chip.active{background:var(--accent);color:#1a1300;border-color:var(--accent);font-weight:600}

  #zoom{position:absolute;left:14px;bottom:14px;z-index:10;display:flex;gap:6px}
  #zoom button{width:32px;height:32px;border:1px solid var(--border);background:var(--panel);
    color:var(--text);border-radius:8px;cursor:pointer;font-size:15px;line-height:1}
  #zoom button:hover{border-color:#3a3a3a;background:var(--panel-2)}
  #zoom .lbl{width:auto;padding:0 10px;font-size:11px;color:var(--muted)}

  #legend{position:absolute;right:360px;bottom:14px;z-index:10;display:flex;gap:14px;
    background:rgba(22,22,22,.85);border:1px solid var(--border);border-radius:10px;
    padding:8px 12px;font-size:10.5px;color:var(--muted);flex-wrap:wrap;max-width:46vw}
  #legend b{color:var(--text)}
  .lk{display:inline-flex;align-items:center;gap:5px}
  .lk i{width:18px;height:0;border-top-width:2px;border-top-style:solid;display:inline-block}

  #side{width:348px;flex:0 0 348px;background:var(--panel);border-left:1px solid var(--border);
    overflow-y:auto;padding:18px 18px 60px;font-size:13px;line-height:1.5}
  #side h2{font-size:15px;margin:0 0 2px}
  #side .role{color:var(--text);margin:10px 0 2px;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  #side .roletext{color:var(--text)}
  #side .plain{color:var(--muted);font-style:italic;margin-top:4px}
  #side .path{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;
    color:var(--accent);background:var(--panel-2);padding:6px 8px;border-radius:6px;
    margin-top:10px;word-break:break-all;border:1px solid var(--border)}
  #side ul{margin:6px 0 0;padding-left:16px;color:var(--muted)}
  #side ul li{margin:3px 0}
  #side .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;
    border:1px solid var(--border);color:var(--muted);margin:3px 4px 0 0}
  .edgeline{font-size:11.5px;margin:3px 0;color:var(--muted)}
  .edgeline b{color:var(--text)}
  .arrow{color:var(--accent)}
  .sec{border-top:1px solid var(--border);margin-top:16px;padding-top:12px}
  .findings li{margin:7px 0;color:var(--text)}
  .findings .src{color:var(--muted);font-size:11px}
  .hint{color:var(--muted);font-size:11px;margin-top:14px}

  .cluster{fill-opacity:.16;stroke-opacity:.5;stroke-width:1.2}
  .cluster-label{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;fill-opacity:.75}
  .node rect{fill:var(--panel-2);stroke-width:1.4;transition:opacity .15s}
  .node.critical rect{stroke-width:2.4}
  .node .nl{font-size:12.5px;font-weight:600;fill:var(--text)}
  .node .ns{font-size:10px;fill:var(--muted)}
  .node{cursor:pointer}
  .node.dim{opacity:.12}
  .edge{fill:none;stroke-width:1.4;transition:opacity .15s}
  /* dimmed edges are fully hidden (was a faint fade — too busy) */
  .edge.dim{opacity:0}
  .edge-label{font-size:9.5px;fill:var(--muted);opacity:.9}
  .edge-label.dim{opacity:0}
  .node.sel rect{stroke:#fff !important}
</style>
</head>

['client','route','service','db','external','critical','muted'].forEach(c=>{

function edgePath(a,b){
  const x1=a.x+a.w, y1=a.y+a.h/2, x2=b.x, y2=b.y+b.h/2;
  if(b.x < a.x){
    const xx1=a.x, xx2=b.x+b.w;
    const dx=Math.max(60,(xx1-xx2)/2);
    return {d:`M${xx1},${y1} C${xx1-dx},${y1} ${xx2+dx},${y2} ${xx2},${y2}`, sx:xx1,sy:y1,ex:xx2,ey:y2,back:true};
  }
  const dx=Math.max(50,(x2-x1)/2);
  return {d:`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`, sx:x1,sy:y1,ex:x2,ey:y2,back:false};
}
const edgeEls=[];
edges.forEach((e,i)=>{
  const a=nodeById[e.from], b=nodeById[e.to];
  if(!a||!b)return;
  const col=kindColor[e.kind]||'muted';
  const strokeCol = col==='muted'?'#5a5a5a':cvar(col);
  const pp=edgePath(a,b);
  const path=document.createElementNS(SVGNS,'path');
  path.setAttribute('d',pp.d);path.setAttribute('class','edge');
  path.setAttribute('stroke',strokeCol);
  path.setAttribute('marker-end','url(#arr-'+col+')');
  if(e.kind==='critical'){path.setAttribute('stroke-width','2.4');}
  if(e.kind==='db'||e.kind==='api'){path.setAttribute('stroke-dasharray','5 4');}
  gE.appendChild(path);
  const t=document.createElementNS(SVGNS,'text');
  const mx=(pp.sx+pp.ex)/2, my=(pp.sy+pp.ey)/2 - 4 + (pp.back? -8: ((i%3)-1)*5);
  t.setAttribute('x',mx);t.setAttribute('y',my);t.setAttribute('text-anchor','middle');
  t.setAttribute('class','edge-label');t.textContent=e.label;
  gEL.appendChild(t);
  edgeEls.push({e,path,label:t});
});

  t1.setAttribute('x',13);t1.setAttribute('y',n.h/2 - 2);t1.setAttribute('class','nl');

/* ============================================================
   PAN + ZOOM
   ============================================================ */
let tx=0,ty=0,scale=1;
function apply(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%';}
function fit(){
  const pad=60;
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  clusters.forEach(c=>{minX=Math.min(minX,c.x);minY=Math.min(minY,c.y);maxX=Math.max(maxX,c.x+c.w);maxY=Math.max(maxY,c.y+c.h);});
  const w=maxX-minX,h=maxY-minY;
  const rect=svg.getBoundingClientRect();
  const s=Math.min((rect.width-pad*2)/w,(rect.height-pad*2)/h);
  scale=Math.min(s,1.1);
  tx=(rect.width-w*scale)/2 - minX*scale;
  ty=(rect.height-h*scale)/2 - minY*scale + 10;
  apply();
}
const stage=document.getElementById('stage');
let dragging=false,lx=0,ly=0;
stage.addEventListener('mousedown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;stage.classList.add('panning');});
window.addEventListener('mouseup',()=>{dragging=false;stage.classList.remove('panning');});
window.addEventListener('mousemove',e=>{if(!dragging)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply();});
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=svg.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const f=e.deltaY<0?1.12:1/1.12;
  const ns=Math.max(.2,Math.min(3,scale*f));
  tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;apply();
},{passive:false});
document.getElementById('zin').onclick=()=>{scale=Math.min(3,scale*1.15);apply();};
document.getElementById('zout').onclick=()=>{scale=Math.max(.2,scale/1.15);apply();};
document.getElementById('zfit').onclick=fit;
stage.addEventListener('click',()=>{ if(selected){selected=null;clearHighlight();renderSidebar(null);} });

/* ============================================================
   HIGHLIGHT + SELECT
   ============================================================ */
let selected=null;
function neighbours(id){
  const ins=[],outs=[],keep=new Set([id]);
  edges.forEach(e=>{
    if(e.from===id){outs.push(e);keep.add(e.to);}
    if(e.to===id){ins.push(e);keep.add(e.from);}
  });
  return {ins,outs,keep};
}
function highlight(id){
  const {keep}=neighbours(id);
  nodes.forEach(n=>nodeEls[n.id].classList.toggle('dim',!keep.has(n.id)));
  edgeEls.forEach(({e,path,label})=>{
    const on=(e.from===id||e.to===id);
    path.classList.toggle('dim',!on);label.classList.toggle('dim',!on);
  });
}
function clearHighlight(){
  if(selected){highlight(selected);return;}
  nodes.forEach(n=>nodeEls[n.id].classList.remove('dim'));
  edgeEls.forEach(({path,label})=>{path.classList.remove('dim');label.classList.remove('dim');});
  applyFilter();
}
function select(id){
  selected=id;
  Object.values(nodeEls).forEach(g=>g.classList.remove('sel'));
  nodeEls[id].classList.add('sel');
  highlight(id);renderSidebar(id);
}

function renderSidebar(id){
  if(!id){ side.innerHTML=defaultSidebar(); return; }
  const n=nodeById[id];const {ins,outs}=neighbours(id);
  let h=`<h2>${esc(n.label)}</h2><div class="ns" style="color:var(--muted)">${esc(n.sub)} · <span style="color:var(--${n.color})">${n.cluster}</span></div>`;
  if(n.critical) h+=`<div style="color:var(--critical);font-size:11px;font-weight:600;margin-top:6px">● on the critical path</div>`;
  h+=`<div class="role">Role</div><div class="roletext">${esc(n.role)}</div>`;
  h+=`<div class="plain">${esc(n.plain)}</div>`;
  if(n.path)h+=`<div class="path">${esc(n.path)}</div>`;
  if(n.notes&&n.notes.length){h+=`<div class="role">Notes</div><ul>`+n.notes.map(x=>`<li>${esc(x)}</li>`).join('')+`</ul>`;}
  if(outs.length){h+=`<div class="role">Calls →</div>`+outs.map(e=>`<div class="edgeline"><span class="arrow">→</span> <b>${esc(nodeById[e.to].label)}</b> · ${esc(e.label)}</div>`).join('');}
  if(ins.length){h+=`<div class="role">← Called by</div>`+ins.map(e=>`<div class="edgeline"><span class="arrow">←</span> <b>${esc(nodeById[e.from].label)}</b> · ${esc(e.label)}</div>`).join('');}
  if(n.tag){h+=`<div class="sec"><div class="role">Filters</div>`+n.tag.filter(t=>t!=='all').map(t=>`<span class="tag">${t}</span>`).join('')+`</div>`;}
  side.innerHTML=h;
}
